name: Chaos (nightly)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  chaos-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit + integration (simulated partition)
        run: |
          cargo test -p axiom-raft -p axiom-engine -p axiom-integration-tests -- --nocapture
      - name: Compile workspace release
        run: cargo build --workspace --release
  chaos-mesh:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Chaos Mesh placeholder
        run: |
          echo "Install Chaos Mesh in soak cluster for pod-kill / network-delay / disk-slow"
          echo "See docs/admin/chaos.md"
