apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: axiomjobs.axiom.io
spec:
  group: axiom.io
  names:
    kind: AxiomJob
    plural: axiomjobs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                aql:
                  type: string
                parallelism:
                  type: integer
