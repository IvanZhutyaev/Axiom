apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: axiomclusters.axiom.io
spec:
  group: axiom.io
  names:
    kind: AxiomCluster
    plural: axiomclusters
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                storageSizeGb:
                  type: integer
